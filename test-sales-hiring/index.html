<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sales Manager Assessment | Elbrus Climbing</title>
  <meta name="description" content="Sales Manager candidate assessment test for Elbrus Climbing">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Prevent iOS zoom on input focus */
    input[type="text"], input[type="url"], input[type="tel"], select {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Global language indicator (shown on contact/question/result screens, disabled) -->
    <div id="lang-indicator" style="display:none;text-align:right;margin-bottom:4px;">
      <select id="lang-indicator-select" disabled style="appearance:none;-webkit-appearance:none;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 28px 5px 10px;font-size:0.8rem;font-family:inherit;color:var(--text-dim);cursor:default;opacity:0.7;background-image:url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2012%2012%22%3E%3Cpath%20fill%3D%22%236b7280%22%20d%3D%22M3%205l3%203%203-3%22%2F%3E%3C%2Fsvg%3E');background-repeat:no-repeat;background-position:right 8px center;">
        <option value="en">EN</option>
        <option value="ru">RU</option>
      </select>
    </div>

    <!-- Progress bar & timer (hidden until test starts) -->
    <div class="progress-container" id="progress-section" style="display:none;">
      <div class="progress-info">
        <span id="progress-text">Question 1 of 46</span>
        <span class="timer green" id="timer">25:00</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Main content area -->
    <div id="main-content"></div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Submitting your results\u2026</div>
  </div>

  <!-- Scripts -->
  <script src="questions.js"></script>
  <script src="scoring.js"></script>
  <script src="app.js"></script>
</body>
</html>
